services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skilix}
      POSTGRES_USER: ${POSTGRES_USER:-skilix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skilix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skilix} -d ${POSTGRES_DB:-skilix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-migrate:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    command: python manage.py migrate --noinput
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://skilix:skilix@postgres:5432/skilix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
    volumes:
      - ./apps/backend:/app
      - backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://skilix:skilix@postgres:5432/skilix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
      - backend_media:/app/media
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    command: celery -A skilix worker --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://skilix:skilix@postgres:5432/skilix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
    volumes:
      - ./apps/backend:/app
      - backend_media:/app/media
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    command: celery -A skilix beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://skilix:skilix@postgres:5432/skilix}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
    volumes:
      - ./apps/backend:/app
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
      DISABLE_HMR: ${DISABLE_HMR:-false}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  backend_media:
  frontend_node_modules:
