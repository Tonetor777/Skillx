<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f4f4f1;font-family:Arial,Helvetica,sans-serif;color:#141414;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f1;padding:32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #d8d8d2;">
            <tr>
              <td style="padding:28px 28px 12px;border-bottom:3px solid #141414;">
                <p style="margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:0;text-transform:uppercase;color:#5f5f5a;">Nexus Academy Grading</p>
                <h1 style="margin:0;font-size:28px;line-height:1.15;color:#141414;">Grade {{ action }}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 18px;font-size:16px;line-height:1.55;">Your submission for <strong>{{ assignment_title }}</strong> has been {{ graded_label }}.</p>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 22px;border:1px solid #d8d8d2;">
                  <tr>
                    <td style="padding:14px 16px;background:#f8f8f5;font-size:13px;font-weight:700;color:#5f5f5a;">Score</td>
                    <td style="padding:14px 16px;text-align:right;font-size:18px;font-weight:700;color:#141414;">{{ score }}/{{ max_points }}</td>
                  </tr>
                </table>
                <p style="margin:0 0 8px;font-size:13px;font-weight:700;color:#5f5f5a;">Feedback</p>
                <p style="margin:0;font-size:15px;line-height:1.55;color:#141414;white-space:pre-line;">{{ feedback }}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
