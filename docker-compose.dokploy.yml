services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      skilix_internal:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      skilix_internal:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-skilix-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - minio_data:/data
    networks:
      skilix_internal:
        aliases:
          - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-skilix-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET: ${MINIO_BUCKET:-skilix-media}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}
      && mc mb --ignore-existing local/$${MINIO_BUCKET}
      && mc anonymous set none local/$${MINIO_BUCKET}"
    networks:
      - skilix_internal
    depends_on:
      minio:
        condition: service_healthy

  backend-migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: "no"
    env_file:
      - .env
    command: python manage.py migrate --noinput
    networks:
      - skilix_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    command: gunicorn skilix.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 180 --access-logfile - --error-logfile -
    expose:
      - "8000"
    networks:
      - skilix_internal
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A skilix worker --loglevel=info
    networks:
      - skilix_internal
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A skilix beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    networks:
      - skilix_internal
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "80"
    networks:
      - skilix_internal
    depends_on:
      backend:
        condition: service_healthy

networks:
  skilix_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
